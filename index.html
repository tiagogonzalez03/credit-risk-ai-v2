<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Credit Risk AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 420px;
}

.search-box {
  position: relative;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.suggestions {
  position: absolute;
  width: 100%;
  background: #1e293b;
  border-radius: 10px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 999;
}

.suggestion-item {
  padding: 10px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #334155;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Credit Risk AI</h2>

<div class="search-box">
  <input id="empresa" placeholder="Digite empresa...">
  <div id="suggestions" class="suggestions"></div>
</div>

<button onclick="buscar()">Buscar</button>
<button onclick="topRisk()">🔥 Top Risco</button>

<div id="resultado"></div>

</div>

<script>

// =========================
// FORMATAR NÚMEROS
// =========================
function formatarNumero(valor) {
  if (valor === null || valor === undefined) return "-";
  return valor.toLocaleString('pt-BR');
}

// =========================
// SCORE (AGORA BASEADO NA PROBABILIDADE)
// =========================
function calcularScore(prob) {
  if (prob < 0.05) return "AAA";
  if (prob < 0.10) return "AA";
  if (prob < 0.20) return "A";
  if (prob < 0.30) return "BBB";
  if (prob < 0.50) return "BB";
  if (prob < 0.70) return "B";
  return "D";
}

function recomendacao(score) {
  if (["AAA","AA","A"].includes(score))
    return "🟢 Comprar / Longo prazo";
  if (["BBB","BB"].includes(score))
    return "🟡 Atenção / Avaliar melhor";
  return "🔴 Evitar / Alto risco";
}

// =========================
// PROBABILIDADE
// =========================
function interpretarProb(p) {
  if (p < 0.05) return "🟢 Muito baixo risco";
  if (p < 0.15) return "🟡 Risco moderado";
  if (p < 0.30) return "🟠 Risco elevado";
  return "🔴 Alto risco";
}

// =========================
// EXPLICAÇÃO
// =========================
function explicacao(item) {
  if (item.Alavancagem > 4.5)
    return "Alta alavancagem é o principal fator de risco.";

  if (item.Crescimento_EBITDA < 0)
    return "Queda no EBITDA aumenta o risco.";

  return "Estrutura financeira relativamente saudável.";
}

// =========================
// AUTOCOMPLETE
// =========================
let timeout = null;

async function autocomplete() {
  const query = document.getElementById("empresa").value;
  const box = document.getElementById("suggestions");

  clearTimeout(timeout);

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  timeout = setTimeout(async () => {
    const res = await fetch(`/api?empresa=${query}`);
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerText = item.Empresa;

      div.onclick = () => {
        document.getElementById("empresa").value = item.Empresa;
        box.innerHTML = "";
      };

      box.appendChild(div);
    });
  }, 300);
}

// =========================
// BUSCA PRINCIPAL
// =========================
async function buscar() {
  const empresa = document.getElementById("empresa").value;
  const div = document.getElementById("resultado");

  div.innerHTML = "🔄 Buscando...";

  const res = await fetch(`/api?empresa=${empresa}`);
  const data = await res.json();

  const item = data[0];

  if (!item) {
    div.innerHTML = "Empresa não encontrada";
    return;
  }

  const prob = item.Prob_Default || 0;
  const score = calcularScore(prob);
  const rec = recomendacao(score);

  div.innerHTML = `
    <div class="card" style="background:#1e293b">

      <h3>${item.Empresa}</h3>

      <p>💰 Dívida: ${formatarNumero(item.Divida_2024)}</p>
      <p>📈 EBITDA: ${formatarNumero(item.EBITDA_2024)}</p>
      <p>⚖️ Alavancagem: ${item.Alavancagem.toFixed(2)}</p>

      <hr>

      <p style="font-size:18px;">
        📊 <b>Probabilidade de Default:</b><br>
        ${(prob * 100).toFixed(1)}%
      </p>

      <p>${interpretarProb(prob)}</p>

      <p style="font-size:18px;">
        ⭐ <b>Score:</b> ${score}
      </p>

      <p>${rec}</p>

      <hr>

      <p><b>🧠 Explicação do Modelo:</b><br>
      ${explicacao(item)}</p>

      <p style="font-size:12px; color:#94a3b8;">
        Modelo: Regressão Logística (3 variáveis)
      </p>

    </div>
  `;
}

// =========================
// TOP RISCO
// =========================
async function topRisk() {
  const div = document.getElementById("resultado");

  const res = await fetch(`/api?tipo=top-risk`);
  const data = await res.json();

  let html = `<div class="card"><h3>🔥 Top 10 Mais Arriscadas</h3>`;

  data.forEach((item, i) => {
    html += `<p>${i + 1}. ${item.Empresa} - ${item.Alavancagem}</p>`;
  });

  html += `</div>`;

  div.innerHTML = html;
}

// evento
document.getElementById("empresa").addEventListener("input", autocomplete);

</script>

</body>
</html>
